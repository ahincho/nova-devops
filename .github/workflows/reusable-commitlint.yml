name: Reusable Commitlint
description: Enforce Conventional Commits on a range of commits
on:
  workflow_call:
    inputs:
      base-ref:
        description: 'Base commit SHA, branch or tag (e.g. main or a commit SHA)'
        required: true
        type: string
      head-ref:
        description: 'Head commit SHA, branch or tag (defaults to HEAD if empty)'
        required: false
        type: string
        default: 'HEAD'
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      config-file:
        description: 'Path to commitlint config file'
        required: false
        type: string
        default: 'commitlint.config.js'
    secrets:
      GH_TOKEN:
        required: false
        description: 'Optional, only needed for PR-comment feedback'

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Nova Setup Node
        uses: ahincho/nova-devops/.github/actions/nova-setup-node@v1
        with:
          node-version: ${{ inputs.node-version }}

      - name: Validate config file exists
        shell: bash
        run: |
          if [ ! -f "${{ inputs.config-file }}" ]; then
            echo "::error::Commitlint config file not found: ${{ inputs.config-file }}"
            echo "::error::Create it with: module.exports = { extends: ['@commitlint/config-conventional'] };"
            exit 1
          fi

      - name: Run commitlint on commit range
        shell: bash
        run: |
          BASE_REF="${{ inputs.base-ref }}"
          HEAD_REF="${{ inputs.head-ref }}"

          # Normalize empty head-ref to HEAD
          if [ -z "${HEAD_REF}" ]; then
            HEAD_REF="HEAD"
          fi

          # If base-ref looks like a branch, resolve to SHA
          if git rev-parse --verify "${BASE_REF}^{commit}" >/dev/null 2>&1; then
            BASE_SHA=$(git rev-parse "${BASE_REF}^{commit}")
          else
            BASE_SHA="${BASE_REF}"
          fi

          # If head-ref looks like a branch, resolve to SHA
          if git rev-parse --verify "${HEAD_REF}^{commit}" >/dev/null 2>&1; then
            HEAD_SHA=$(git rev-parse "${HEAD_REF}^{commit}")
          else
            HEAD_SHA="${HEAD_REF}"
          fi

          echo "Validating commits from ${BASE_SHA:0:8} to ${HEAD_SHA:0:8}"

          npx commitlint \
            --from="${BASE_SHA}" \
            --to="${HEAD_SHA}" \
            --config="${{ inputs.config-file }}" \
            --verbose
