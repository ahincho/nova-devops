# All uses: refs in this workflow are SHA-pinned (Lote Q hardening, see CHANGELOG.md).
# - External actions: pinned to commit SHAs of the desired version tag
# - Internal actions (ahincho/nova-devops/.github/actions/*): pinned to commit 300f6695c82197f50b2cfa0831bd146ed549a279
# To bump internal action SHAs after a nova-devops release: search/replace the SHA in this file.
name: Reusable SBOM Generation (CycloneDX)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      build-tool:
        description: 'Build tool (maven | gradle)'
        required: false
        type: string
        default: 'gradle'
      sbom-format:
        description: 'SBOM output format (json | xml)'
        required: false
        type: string
        default: 'json'
      upload-sbom:
        description: 'Upload SBOM as artifact'
        required: false
        type: boolean
        default: true
      attach-to-release:
        description: 'Attach SBOM to GitHub Release (requires release context)'
        required: false
        type: boolean
        default: false
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos (Maven only). Optional;
          without it, cross-repo GitHub Packages reads get a 401.
        required: false
      NOVA_PLATFORM_APP_ID:
        description: 'GitHub App ID (numeric). Optional; auto-managed via App if set on consuming repo.'
        required: false
      NOVA_PLATFORM_APP_PRIVATE_KEY:
        description: 'GitHub App private key (PEM contents, multi-line). Optional; auto-managed via App if set on consuming repo.'
        required: false
# Read-only: generates the SBOM (CycloneDX) and uploads it as an artifact.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5

      - name: Make gradlew executable
        if: inputs.build-tool == 'gradle'
        run: chmod +x ./gradlew

      - name: Nova Resolve Token
        id: resolve_token
        uses: ahincho/nova-devops/.github/actions/nova-resolve-token@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          app-id: ${{ secrets.NOVA_PLATFORM_APP_ID }}
          app-private-key: ${{ secrets.NOVA_PLATFORM_APP_PRIVATE_KEY }}

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: ${{ inputs.build-tool }}
          packages-read-token: ${{ steps.resolve_token.outputs.value }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)

      - name: Decide SBOM engine (Gradle)
        if: inputs.build-tool == 'gradle'
        id: gradle-sbom-engine
        env:
          NOVA_PACKAGES_READ_TOKEN: ${{ steps.resolve_token.outputs.value }}
        run: |
          # CycloneDX Gradle plugin must be applied in the project's build.gradle.kts:
          #   plugins { id("org.cyclonedx.bom") version "3.2.4" }
          # NOTE: v2.x+ of this plugin configures output via a typed `tasks.cyclonedxBom { }`
          # extension block (jsonOutput/xmlOutput Property<RegularFile>), NOT via '-P' command-line
          # properties (there is no project.findProperty() reading in the plugin). With zero extra
          # config the task writes BOTH build/reports/cyclonedx/bom.json and bom.xml by default,
          # which is why no '-P' flags are passed here - the "Locate SBOM file" step below already
          # searches that default path for whichever format was requested.
          # If the plugin is not applied at all, fall back to anchore/sbom-action@v0 (was anchore/syft-action@v1)
          # (previously we used `curl ... | sh` to install syft, which is an unaudited remote
          # script execution pattern - replaced in 2026-07-21 hardening).
          if ./gradlew tasks --all 2>/dev/null | grep -q "cyclonedxBom"; then
            ./gradlew cyclonedxBom
            echo "engine=gradle-plugin" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::CycloneDX Gradle plugin not applied. Falling back to anchore/sbom-action@v0 (was anchore/syft-action@v1)."
            echo "engine=syft" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate SBOM with syft (Gradle fallback)
        if: inputs.build-tool == 'gradle' && steps.gradle-sbom-engine.outputs.engine == 'syft'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0 (was anchore/sbom-action@v0 (was anchore/syft-action@v1), deprecated)
        with:
          image: dir://${{ github.workspace }}
          format: cyclonedx-${{ inputs.sbom-format }}
          output-file: build/reports/bom.${{ inputs.sbom-format }}

      - name: Generate SBOM (Maven - CycloneDX plugin)
        if: inputs.build-tool == 'maven'
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeBom \
            -DoutputFormat=${{ inputs.sbom-format }} \
            -DoutputName=bom

      - name: Locate SBOM file
        id: locate
        shell: bash
        run: |
          # Search common output locations
          SBOM_FILE=""
          for path in \
            "build/reports/bom.${{ inputs.sbom-format }}" \
            "build/reports/cyclonedx/bom.${{ inputs.sbom-format }}" \
            "target/bom.${{ inputs.sbom-format }}" \
            "target/classes/META-INF/sbom/bom.${{ inputs.sbom-format }}"; do
            if [ -f "$path" ]; then
              SBOM_FILE="$path"
              break
            fi
          done
          if [ -z "$SBOM_FILE" ]; then
            # Try find as last resort
            SBOM_FILE=$(find . -name "bom.${{ inputs.sbom-format }}" -not -path "*/node_modules/*" -not -path "*/.gradle/*" | head -1)
          fi
          if [ -z "$SBOM_FILE" ]; then
            echo "::error::SBOM file not found after generation"
            exit 1
          fi
          echo "path=${SBOM_FILE}" >> "$GITHUB_OUTPUT"
          echo "Found SBOM at: ${SBOM_FILE}"

      - name: Upload SBOM as artifact
        if: inputs.upload-sbom
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: sbom-cyclonedx-${{ inputs.sbom-format }}
          path: ${{ steps.locate.outputs.path }}

      - name: Attach SBOM to GitHub Release
        if: inputs.attach-to-release && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          SBOM_FILE="${{ steps.locate.outputs.path }}"
          ARTIFACT_NAME="sbom-${{ steps.facts.outputs.version }}.cyclonedx.${{ inputs.sbom-format }}"
          gh release upload "${RELEASE_TAG}" "${SBOM_FILE}#${ARTIFACT_NAME}" --clobber

      - name: SBOM Summary
        if: always()
        run: |
          echo "## SBOM Generation (CycloneDX)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format | ${{ inputs.sbom-format }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build tool | ${{ inputs.build-tool }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.facts.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM path | ${{ steps.locate.outputs.path }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Uploaded as artifact | ${{ inputs.upload-sbom }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Attached to release | ${{ inputs.attach-to-release }} |" >> "$GITHUB_STEP_SUMMARY"
