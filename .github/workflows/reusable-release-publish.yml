# All uses: refs in this workflow are SHA-pinned (Lote Q hardening, see CHANGELOG.md).
# - External actions: pinned to commit SHAs of the desired version tag
# - Internal actions (ahincho/nova-devops/.github/actions/*): pinned to commit 300f6695c82197f50b2cfa0831bd146ed549a279
# To bump internal action SHAs after a nova-devops release: search/replace the SHA in this file.
name: Reusable Release Publish (Gradle)

description: |

  Triggered by tag push (v*.*.*). Runs after release-please creates a tag.
  Publishes to GitHub Packages. Replaces the version-bump + publish chain
  with a single, deterministic flow.

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      visibility:
        description: 'Package visibility (public | private). Defaults to vars.NOVA_PACKAGE_VISIBILITY if set, otherwise "public".'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'If true, only print commands without executing (uses publishToMavenLocal)'
        required: false
        type: string
        default: 'false'
      packages-read-token:
        description: >-
          Token for cross-repo GitHub Packages reads (e.g. consuming nova-bom
          from nova-java-spring-boot-parent). Pass secrets.NOVA_PACKAGES_READ_TOKEN
          (or App token from nova-resolve-token). Falls back to github.token if
          empty, which works only for same-repo reads. Only relevant for Maven
          projects; Gradle repos configure cross-repo credentials directly in
          build.gradle.kts.
        required: false
        type: string
        default: ''
    secrets:
      # Named GH_TOKEN (not GITHUB_TOKEN): GitHub Actions rejects secret names
      # that collide with reserved system names in workflow_call.secrets.
      # NOTE: this is very likely the real root cause of the "reusable + tag
      # push" limitation documented in section 11.7 (this workflow could never
      # be invoked at all, regardless of the trigger, since GITHUB_TOKEN is a
      # reserved name here) â€” not a genuine platform limitation as assumed at
      # the time. Kept unused (publish-on-tag.yml in each repo has the same
      # logic inlined as a workaround) but fixed here for future reuse.
      GH_TOKEN:
        required: true
      NOVA_PACKAGES_READ_TOKEN:
        description: 'Token for cross-repo GitHub Packages reads. Optional; falls back to github.token (same-repo only) if unset.'
        required: false

# Pushes the release tag and publishes the artifact to GitHub Packages + Maven Central.
permissions:
  contents: write
  packages: write

# Tag-driven publish: NEVER cancel; one tag = one canonical publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5
        with:
          fetch-depth: 0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${{ github.ref_name }} does not match vX.Y.Z format"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is valid semver"

      - name: Sync version from tag to gradle.properties
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "Setting version=${VERSION} in gradle.properties"
          sed -i "s/^version=.*/version=${VERSION}/" gradle.properties
          cat gradle.properties

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: gradle
          packages-read-token: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || inputs.packages-read-token }}

      - name: Resolve package visibility
        id: visibility
        env:
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
          VAR_VISIBILITY: ${{ vars.NOVA_PACKAGE_VISIBILITY }}
          INPUT_VISIBILITY: ${{ inputs.visibility }}
        run: |
          if [ -n "${INPUT_VISIBILITY}" ]; then
            EFFECTIVE="${INPUT_VISIBILITY}"
          elif [ -n "${VAR_VISIBILITY}" ]; then
            EFFECTIVE="${VAR_VISIBILITY}"
          else
            EFFECTIVE="public"
          fi
          echo "value=${EFFECTIVE}" >> "$GITHUB_OUTPUT"
          echo "Effective visibility: ${EFFECTIVE} (repo=${REPO_VISIBILITY}, var=${VAR_VISIBILITY}, input=${INPUT_VISIBILITY})"

      - name: Validate visibility compatibility
        shell: bash
        run: |
          REPO_VIS="${{ github.event.repository.visibility }}"
          PKG_VIS="${{ steps.visibility.outputs.value }}"
          if [ "${REPO_VIS}" = "public" ] && [ "${PKG_VIS}" = "private" ]; then
            echo "::error::Cannot publish private package from public repo"
            exit 1
          fi
          if [ "${REPO_VIS}" = "private" ] && [ "${PKG_VIS}" = "public" ]; then
            echo "::error::Cannot publish public package from private repo"
            exit 1
          fi
          echo "Visibility validation OK: repo=${REPO_VIS}, package=${PKG_VIS}"

      - name: Publish to GitHub Packages
        if: inputs.dry-run != 'true'
        run: ./gradlew publish -Pvisibility=${{ steps.visibility.outputs.value }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Dry-run mode (publishToMavenLocal)
        if: inputs.dry-run == 'true'
        run: ./gradlew publishToMavenLocal -Pvisibility=${{ steps.visibility.outputs.value }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # SLSA v1.0 Level 3 provenance attestation. Generates a verifiable record
      # of the build (who, what source, how) attached as a separate attestation
      # to each built jar. Consumers verify with:
      #   gh attestation verify <jar> --owner ahincho
      # Skipped on dry-run since publishToMavenLocal doesn't produce a real artifact
      # to attest (and the local deploy would fail the verify anyway).
      # See CHANGELOG.md Lote M for details.
      - name: Attest built jars (SLSA provenance)
        if: inputs.dry-run != 'true'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: 'build/libs/*.jar'