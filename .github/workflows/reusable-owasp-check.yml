name: Reusable OWASP Dependency Check

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      build-tool:
        description: 'Build tool (maven | gradle)'
        required: false
        type: string
        default: 'gradle'
      fail-on-cvss:
        description: 'Fail if any CVE has CVSS score >= this value (0-10, 0 = fail on any)'
        required: false
        type: string
        default: '7'
      suppression-file:
        description: 'Path to OWASP suppression XML file (optional, for known false positives)'
        required: false
        type: string
        default: ''
      analyzer-override:
        description: >-
          Comma-separated OWASP analyzers to RE-ENABLE on top of the default-off set.
          Use when a repo bundles other ecosystems (npm frontend, native C/C++ source,
          gradle plugin processing Go code, etc.) where disabling the corresponding
          analyzer would hide real signal. Allowed values: nuspec, nugetconf, msbuild,
          golang|go|golangdep, golangmod|gomod, gogradle, swift, cocoapods, carthage,
          composer, cpanfile|perl, cmake, autoconf, bundle|ruby|bundler, pydistribution,
          pypackage|pip, pipenv, poetry, pyinstall, setuptools, rubygems, dart|pub,
          assembly, retirejs, clang, haskell|stack, mix|elixir, rebar|erlang,
          cargo|rust, yarn, pnpm, npm|node. Empty = default (all default-off analyzers
          stay disabled). Precedence: this input > repo variable
          DEPENDENCY_CHECK_ANALYZERS (Settings > Secrets and variables > Variables).
        required: false
        type: string
        default: ''
      cve-suppressions:
        description: >-
          Comma-separated list of CVE IDs to suppress as documented false positives.
          Each CVE must exist in nova-devops/docs/owasp-suppressions.json with
          status="active". Unknown CVEs emit a warning and are skipped. Precedence:
          this input > repo variable NOVA_OWASP_CVE_SUPPRESSIONS (Settings > Secrets
          and variables > Variables). Empty = no suppressions. The generated
          suppressions.xml is exposed to consumers via the NOVA_OWASP_SUPPRESSIONS_FILE
          env var (Gradle) and via -DsuppressionFiles (Maven) - the consumer's
          build.gradle.kts must read the env var to opt in (default consumers ignore it).
        required: false
        type: string
        default: ''
      upload-report:
        description: 'Upload HTML report as artifact'
        required: false
        type: boolean
        default: true
    secrets:
      NVD_API_KEY:
        description: 'NVD API Key (https://nvd.nist.gov/developers/request-an-api-key). Optional but highly recommended - without it, NVD data updates are extremely slow and rate-limited.'
        required: false
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos (Maven only). Optional;
          without it, cross-repo GitHub Packages reads get a 401.
        required: false

jobs:
  owasp-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        if: inputs.build-tool == 'gradle'
        run: chmod +x ./gradlew

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: ${{ inputs.build-tool }}
          packages-read-token: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || secrets.NOVA_RELEASE_PAT }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main

      - name: Get date bucket for NVD cache
        id: nvd-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Generates /tmp/owasp/suppressions.xml from the central FP registry in
      # nova-devops/docs/owasp-suppressions.json. The input is a comma-separated
      # list of CVE IDs; only CVEs with status="active" in the registry are
      # included. Unknown CVEs emit a ::warning:: and are skipped. The output
      # path is forwarded to the Gradle step via NOVA_OWASP_SUPPRESSIONS_FILE
      # (consumers read it in dependencyCheck { } via System.getenv) and to the
      # Maven step via -DsuppressionFiles=. If the registry download fails,
      # the step warns and continues with an empty file path (no opt-in = no FP
      # applied, which is the safe default).
      - name: Generate dynamic CVE suppression file
        id: cve-suppressions
        if: ${{ inputs.cve-suppressions != '' || vars.NOVA_OWASP_CVE_SUPPRESSIONS != '' }}
        env:
          SUPPRESSION_LIST: ${{ inputs.cve-suppressions || vars.NOVA_OWASP_CVE_SUPPRESSIONS || '' }}
        run: |
          mkdir -p /tmp/owasp
          REGISTRY_URL="https://raw.githubusercontent.com/ahincho/nova-devops/main/docs/owasp-suppressions.json"
          if ! curl -fsSL --retry 3 -o /tmp/owasp/registry.json "$REGISTRY_URL"; then
            echo "::warning::Could not download the FP suppression registry from nova-devops. NOVA_OWASP_CVE_SUPPRESSIONS will be IGNORED for this run."
            echo "suppressions-file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd">'
            IFS=',' read -ra CVES <<< "$SUPPRESSION_LIST"
            APPLIED=0
            SKIPPED=0
            for cve in "${CVES[@]}"; do
              cve="$(echo "$cve" | xargs)"
              [ -z "$cve" ] && continue
              entry=$(jq --arg cve "$cve" '.suppressions[] | select(.cve == $cve)' /tmp/owasp/registry.json)
              if [ -z "$entry" ]; then
                echo "::warning::CVE '$cve' is in NOVA_OWASP_CVE_SUPPRESSIONS but not documented in nova-devops/docs/owasp-suppressions.json. Skipping. Add an entry to the registry first (PR to nova-devops) before listing a CVE here."
                SKIPPED=$((SKIPPED + 1))
                continue
              fi
              status=$(echo "$entry" | jq -r '.status')
              if [ "$status" != "active" ]; then
                echo "::warning::CVE '$cve' is in registry but status is '$status' (not 'active'). Skipping. Set status to 'active' in the registry to enable."
                SKIPPED=$((SKIPPED + 1))
                continue
              fi
              pkg=$(echo "$entry" | jq -r '.package')
              pmgr=$(echo "$entry" | jq -r '.package_manager')
              reason=$(echo "$entry" | jq -r '.reason')
              verified_by=$(echo "$entry" | jq -r '.verified_by')
              verified_date=$(echo "$entry" | jq -r '.verified_date')
              echo "  <suppress>"
              echo "    <notes><![CDATA[$reason (documented FP, verified by $verified_by on $verified_date)]]></notes>"
              # The dependency-check packageUrl matcher is EXACT by default - the
              # `@*` token was treated as a literal asterisk and produced "zero
              # matches" in CI run 29278748111. We use regex="true" with `@.*` to
              # match any version of the artifact. The . in groupId is escaped
              # to avoid matching unintended artifacts (e.g. "kotlinx" would
              # otherwise match "kotlin.*").
              echo "    <packageUrl regex=\"true\">pkg:$pmgr/$(echo "$pkg" | sed 's/\./\\./g')@.*</packageUrl>"
              echo "    <cve>$cve</cve>"
              echo "  </suppress>"
              APPLIED=$((APPLIED + 1))
            done
            echo '</suppressions>'
          } > /tmp/owasp/suppressions.xml
          {
            echo "## CVE Suppressions Applied"
            echo ""
            echo "| Source | Count |"
            echo "|---|---|"
            echo "| Input | $((APPLIED + SKIPPED)) |"
            echo "| Applied (active in registry) | $APPLIED |"
            echo "| Skipped (not in registry or inactive) | $SKIPPED |"
            echo ""
            echo '```xml'
            cat /tmp/owasp/suppressions.xml
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "suppressions-file=/tmp/owasp/suppressions.xml" >> "$GITHUB_OUTPUT"

      # NOTE: the cache key is a plain UTC date, NOT hashFiles(build.gradle*/pom.xml).
      # The NVD dataset changes with time, not with our own dependency versions -
      # keying on build files caused unnecessary invalidation on every dependency bump.
      #
      # This is also branch/PR-scoped by GitHub's own cache rules (a cache saved on
      # branch A is invisible to branch B unless A is the repo's default branch), so
      # it is a *fast path* for repeat runs on the SAME branch only. The step below
      # ("Restore NVD mirror") is what actually solves cross-branch/cross-PR sharing.
      #
      # The path (~/.dependency-check-data) is a single, build-tool-agnostic location
      # that BOTH the Gradle consumer (data.directory in build.gradle.kts) and the
      # Maven step below (-DdataDirectory=) are explicitly pointed at. Do not assume
      # either tool's built-in default here: they differ (Gradle's is undocumented;
      # Maven's own default is nested inside ~/.m2/repository, which actions/setup-java's
      # own `cache: maven` already manages independently) and mixing them silently
      # caches nothing useful.
      - name: Cache NVD Database (same-branch fast path)
        id: local-cache
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: ${{ runner.os }}-nvd-${{ steps.nvd-date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-nvd-

      # Single-updater/multiple-readers pattern (see docs/data/cacheh2.html):
      # ahincho/nova-devops's nvd-mirror-update.yml is the ONLY workflow across
      # all Nova Java repos that is allowed to do a full NVD sync, once a day.
      # Every repo's PR/CI OWASP job just downloads that pre-built database
      # read-only here, instead of the 12 repos hitting NVD independently
      # (which is what caused 30-50+ min OWASP runs - see docs/java/06-semantic-versioning-en-java.md).
      # nova-devops is a public repo, so this download needs no authentication.
      - name: Restore NVD mirror from nova-devops (shared baseline)
        if: steps.local-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p ~/.dependency-check-data
          if curl -fsSL --retry 3 -o /tmp/nvd-mirror.zip \
              "https://github.com/ahincho/nova-devops/releases/download/nvd-mirror/dependency-check-data.zip"; then
            unzip -qo /tmp/nvd-mirror.zip -d ~/.dependency-check-data
            echo "NVD mirror restored from ahincho/nova-devops (built at most ~24h ago)."
          else
            echo "::warning::Could not download the NVD mirror from nova-devops. Falling back to a direct (slower) sync against NVD."
          fi

      - name: Run OWASP Dependency Check (Gradle)
        if: inputs.build-tool == 'gradle'
        # NVD_API_KEY is configured per-repo (12/12 repos as of 2026-07-12).
        # Failures here are real CVSS-threshold breaches and should block the build.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          NOVA_OWASP_FAIL_ON_CVSS: ${{ inputs.fail-on-cvss }}
          NOVA_OWASP_SUPPRESSION_FILE: ${{ inputs.suppression-file }}
          # Falls back to NOVA_RELEASE_PAT (already proven to have packages:read,
          # see docs/java/06-semantic-versioning-en-java.md §11.9.17) so consumers
          # don't need a brand-new dedicated secret just for this.
          NOVA_PACKAGES_READ_TOKEN: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || secrets.NOVA_RELEASE_PAT }}
          # Analyzer override contract for Gradle consumers: the consumer's
          # build.gradle.kts reads this via System.getenv("NOVA_OWASP_ANALYZER_OVERRIDE")
          # and re-enables the listed analyzers on top of its default-off set.
          # The Gradle plugin does NOT consume -P properties (see run-step comment),
          # so an env var is the only way to pass a per-call override here.
          NOVA_OWASP_ANALYZER_OVERRIDE: ${{ inputs.analyzer-override || vars.DEPENDENCY_CHECK_ANALYZERS || '' }}
          # CVE suppression file path (generated by the "Generate dynamic CVE
          # suppression file" step when cve-suppressions is set). Empty when
          # the input is empty. Consumers that want to opt in to FP suppressions
          # read this via System.getenv("NOVA_OWASP_SUPPRESSIONS_FILE") inside
          # their dependencyCheck { } block and add it to suppressionFiles.
          NOVA_OWASP_SUPPRESSIONS_FILE: ${{ steps.cve-suppressions.outputs.suppressions-file }}
        run: |
          # NOTE: the org.owasp.dependencycheck Gradle plugin does NOT read '-P'
          # command-line properties (verified against its source: DependencyCheckPlugin.groovy
          # / DependencyCheckExtension.groovy have no project.findProperty() calls at all).
          # All configuration must go through the typed `dependencyCheck { }` extension block
          # in each consumer's build.gradle.kts, which reads these env vars via System.getenv().
          #
          # '~' only expands in a shell, not in a workflow `env:` mapping or in the
          # JVM - so the absolute path is resolved here and exported just before
          # invoking Gradle. Must match the path cached/restored above.
          export NOVA_OWASP_DATA_DIR="${HOME}/.dependency-check-data"
          if [ -z "${NVD_API_KEY}" ]; then
            echo "::warning::No NVD_API_KEY provided. Updates will be extremely slow/rate-limited. See https://nvd.nist.gov/developers/request-an-api-key"
          fi
          ./gradlew dependencyCheckAnalyze --info

      - name: Run OWASP Dependency Check (Maven)
        if: inputs.build-tool == 'maven'
        # NVD_API_KEY is configured per-repo (12/12 repos as of 2026-07-12).
        # Failures here are real CVSS-threshold breaches and should block the build.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ARGS="-DfailBuildOnCVSS=${{ inputs.fail-on-cvss }}"
          # Must match the path cached/restored above (Maven's own default,
          # ~/.m2/repository/org/owasp/dependency-check-data/, is nested inside
          # the tree actions/setup-java's `cache: maven` already manages
          # independently - keep OWASP's data fully separate from that).
          # NOTE: do not use `realpath` here - the directory may not exist yet
          # on a first-ever run with no cache/mirror to restore, and Maven
          # creates it on demand.
          mkdir -p "${HOME}/.dependency-check-data"
          ARGS="${ARGS} -DdataDirectory=${HOME}/.dependency-check-data"
          # Investigation (2026-07-13, docs/java/06-semantic-versioning-en-java.md):
          # a cold NVD sync took 50+ min mostly due to cache scoping, NOT these
          # analyzers - but disabling ecosystems that plainly do not exist in
          # any Nova Maven repo removes real (if smaller) analyze-phase
          # overhead and network surface at zero detection-feature cost.
          # Property names verified against the actually-installed plugin via
          # `mvn help:describe -Dplugin=org.owasp:dependency-check-maven:12.2.2
          # -Dgoal=check -Ddetail=true` - Maven's analyzer set has DIVERGED
          # from the Gradle plugin's even at the same version number (e.g.
          # carthageAnalyzerEnabled still exists here, Gradle 12.2.2 dropped it).
          # Deliberately NOT disabled: node/nodeAudit analyzers (every Nova
          # repo has a real package.json for commitlint/lefthook) and
          # opensslAnalyzerEnabled (harmless/fast). This is centralized here,
          # not per-repo pom.xml, because all 3 Maven repos invoke the plugin
          # via its bare coordinates with zero <build><plugins> declaration -
          # command-line -D properties are the ONLY configuration surface.
          ARGS="${ARGS} -DretireJsAnalyzerEnabled=false"
          ARGS="${ARGS} -DassemblyAnalyzerEnabled=false"
          ARGS="${ARGS} -DnuspecAnalyzerEnabled=false"
          ARGS="${ARGS} -DnugetconfAnalyzerEnabled=false"
          ARGS="${ARGS} -DmsbuildAnalyzerEnabled=false"
          ARGS="${ARGS} -DgolangDepEnabled=false"
          ARGS="${ARGS} -DgolangModEnabled=false"
          ARGS="${ARGS} -DswiftPackageManagerAnalyzerEnabled=false"
          ARGS="${ARGS} -DswiftPackageResolvedAnalyzerEnabled=false"
          ARGS="${ARGS} -DcocoapodsAnalyzerEnabled=false"
          ARGS="${ARGS} -DcarthageAnalyzerEnabled=false"
          ARGS="${ARGS} -DcomposerAnalyzerEnabled=false"
          ARGS="${ARGS} -DcpanfileAnalyzerEnabled=false"
          ARGS="${ARGS} -DcmakeAnalyzerEnabled=false"
          ARGS="${ARGS} -DautoconfAnalyzerEnabled=false"
          ARGS="${ARGS} -DbundleAuditAnalyzerEnabled=false"
          ARGS="${ARGS} -DpyDistributionAnalyzerEnabled=false"
          ARGS="${ARGS} -DpyPackageAnalyzerEnabled=false"
          ARGS="${ARGS} -DrubygemsAnalyzerEnabled=false"
          ARGS="${ARGS} -DdartAnalyzerEnabled=false"
          # Apply analyzer override (re-enables default-off analyzers on top of the
          # explicit -D<name>...=false lines above). Last -D wins for the same property
          # in Maven, so a true override here flips the default back to enabled.
          # Allowed tokens: nuspec, nugetconf, msbuild, golang|go|golangdep,
          # golangmod|gomod, gogradle, swift, cocoapods, carthage, composer,
          # cpanfile|perl, cmake, autoconf, bundle|ruby|bundler, pydistribution,
          # pypackage|pip, pipenv, poetry, pyinstall, setuptools, rubygems, dart|pub,
          # assembly, retirejs, clang, haskell|stack, mix|elixir, rebar|erlang,
          # cargo|rust, yarn, pnpm, npm|node. Unknown tokens are silently ignored.
          OVERRIDE_RAW="${{ inputs.analyzer-override || vars.DEPENDENCY_CHECK_ANALYZERS || '' }}"
          if [ -n "${OVERRIDE_RAW}" ]; then
            echo "Analyzer override applied: ${OVERRIDE_RAW}"
            IFS=',' read -ra OVERRIDE <<< "${OVERRIDE_RAW}"
            for tok in "${OVERRIDE[@]}"; do
              tok="$(echo "${tok}" | tr '[:upper:]' '[:lower:]' | xargs)"
              case "${tok}" in
                nuspec) ARGS="${ARGS} -DnuspecAnalyzerEnabled=true" ;;
                nugetconf) ARGS="${ARGS} -DnugetconfAnalyzerEnabled=true" ;;
                msbuild) ARGS="${ARGS} -DmsbuildAnalyzerEnabled=true" ;;
                golang|go|golangdep) ARGS="${ARGS} -DgolangDepEnabled=true" ;;
                golangmod|gomod) ARGS="${ARGS} -DgolangModEnabled=true" ;;
                gogradle) ARGS="${ARGS} -DgoGradleAnalyzerEnabled=true" ;;
                swift) ARGS="${ARGS} -DswiftPackageManagerAnalyzerEnabled=true -DswiftPackageResolvedAnalyzerEnabled=true" ;;
                cocoapods) ARGS="${ARGS} -DcocoapodsAnalyzerEnabled=true" ;;
                carthage) ARGS="${ARGS} -DcarthageAnalyzerEnabled=true" ;;
                composer) ARGS="${ARGS} -DcomposerAnalyzerEnabled=true" ;;
                cpanfile|perl) ARGS="${ARGS} -DcpanfileAnalyzerEnabled=true" ;;
                cmake) ARGS="${ARGS} -DcmakeAnalyzerEnabled=true" ;;
                autoconf) ARGS="${ARGS} -DautoconfAnalyzerEnabled=true" ;;
                bundle|ruby|bundler) ARGS="${ARGS} -DbundleAuditAnalyzerEnabled=true" ;;
                pydistribution) ARGS="${ARGS} -DpyDistributionAnalyzerEnabled=true" ;;
                pypackage|pip) ARGS="${ARGS} -DpyPackageAnalyzerEnabled=true" ;;
                pipenv) ARGS="${ARGS} -DpipenvAnalyzerEnabled=true" ;;
                poetry) ARGS="${ARGS} -DpoetryAnalyzerEnabled=true" ;;
                pyinstall) ARGS="${ARGS} -DpyInstallAnalyzerEnabled=true" ;;
                setuptools) ARGS="${ARGS} -DsetuptoolsAnalyzerEnabled=true" ;;
                rubygems) ARGS="${ARGS} -DrubygemsAnalyzerEnabled=true" ;;
                dart|pub) ARGS="${ARGS} -DdartAnalyzerEnabled=true" ;;
                assembly) ARGS="${ARGS} -DassemblyAnalyzerEnabled=true" ;;
                retirejs) ARGS="${ARGS} -DretireJsAnalyzerEnabled=true" ;;
                clang) ARGS="${ARGS} -DclangAnalyzerEnabled=true" ;;
                haskell|stack) ARGS="${ARGS} -DhaskellStackAnalyzerEnabled=true" ;;
                mix|elixir) ARGS="${ARGS} -DmixAuditAnalyzerEnabled=true" ;;
                rebar|erlang) ARGS="${ARGS} -DrebarAnalyzerEnabled=true" ;;
                cargo|rust) ARGS="${ARGS} -DcargoAnalyzerEnabled=true" ;;
                yarn) ARGS="${ARGS} -DyarnAnalyzerEnabled=true" ;;
                pnpm) ARGS="${ARGS} -DpnpmAnalyzerEnabled=true" ;;
                npm|node) ARGS="${ARGS} -DnodeAnalyzerEnabled=true -DnodeAuditEnabled=true" ;;
                *) echo "::warning::Unknown analyzer override token ignored: '${tok}'" ;;
              esac
            done
          fi
          if [ -n "${{ inputs.suppression-file }}" ]; then
            ARGS="${ARGS} -DsuppressionFiles=${{ inputs.suppression-file }}"
          fi
          # Dynamic FP suppression file (from nova-devops registry, see
          # cve-suppressions input). The Maven plugin accepts multiple files
          # via a comma-separated list, so we append rather than overwrite
          # any explicit suppression-file input above.
          if [ -n "${{ steps.cve-suppressions.outputs.suppressions-file }}" ] && [ -s "${{ steps.cve-suppressions.outputs.suppressions-file }}" ]; then
            if [ -n "${{ inputs.suppression-file }}" ]; then
              ARGS="${ARGS} -DsuppressionFiles=${{ inputs.suppression-file }},${{ steps.cve-suppressions.outputs.suppressions-file }}"
            else
              ARGS="${ARGS} -DsuppressionFiles=${{ steps.cve-suppressions.outputs.suppressions-file }}"
            fi
          fi
          if [ -n "${NVD_API_KEY}" ]; then
            ARGS="${ARGS} -DnvdApiKey=${NVD_API_KEY}"
          else
            echo "::warning::No NVD_API_KEY provided. Updates will be extremely slow/rate-limited. See https://nvd.nist.gov/developers/request-an-api-key"
          fi
          mvn org.owasp:dependency-check-maven:check ${ARGS}

      - name: Upload OWASP Report
        if: inputs.upload-report && always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: |
            **/build/reports/dependency-check/dependency-check-report.html
            **/target/dependency-check-report.html

      - name: OWASP Summary
        if: always()
        run: |
          echo "## OWASP Dependency Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fail on CVSS >= | ${{ inputs.fail-on-cvss }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build tool | ${{ inputs.build-tool }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suppression file | ${{ inputs.suppression-file || 'none' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CVE suppressions (registry) | ${{ inputs.cve-suppressions || vars.NOVA_OWASP_CVE_SUPPRESSIONS || 'none' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Analyzer override | ${{ inputs.analyzer-override || vars.DEPENDENCY_CHECK_ANALYZERS || 'none (all default-off analyzers disabled)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.facts.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
