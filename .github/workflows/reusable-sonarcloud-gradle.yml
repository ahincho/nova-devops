name: Reusable SonarCloud Analysis (Gradle)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      sonar-org:
        description: 'SonarCloud organization'
        required: true
        type: string
      sonar-project-key:
        description: 'SonarCloud project key'
        required: true
        type: string
    secrets:
      NOVA_SONAR_TOKEN:
        description: >-
          SonarCloud authentication token. If not configured, this workflow skips
          analysis with a warning instead of failing. DORMANT (no Nova repo has
          this secret configured yet as of 2026-07-15; will be activated when
          SonarCloud integration is rolled out per docs/java/11 §11.10).
        required: false

jobs:
  sonar-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check NOVA_SONAR_TOKEN availability
        id: check-token
        shell: bash
        env:
          TOKEN: ${{ secrets.NOVA_SONAR_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::warning::NOVA_SONAR_TOKEN secret is not configured for this repo/org. Skipping SonarCloud analysis. Create a project at sonarcloud.io and add the NOVA_SONAR_TOKEN secret to enable this check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.check-token.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make gradlew executable
        if: steps.check-token.outputs.skip == 'false'
        run: chmod +x ./gradlew

      - name: Setup Java
        if: steps.check-token.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Generate JaCoCo Report
        if: steps.check-token.outputs.skip == 'false'
        run: ./gradlew build jacocoTestReport

      - name: SonarCloud Analysis
        if: steps.check-token.outputs.skip == 'false'
        run: >
          ./gradlew sonar
          -Dsonar.organization=${{ inputs.sonar-org }}
          -Dsonar.projectKey=${{ inputs.sonar-project-key }}
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
        env:
          SONAR_TOKEN: ${{ secrets.NOVA_SONAR_TOKEN }}
