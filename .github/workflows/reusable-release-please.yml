name: Reusable Release Please
description: Run release-please for automated Conventional Commits based versioning
on:
  workflow_call:
    inputs:
      path:
        description: 'Filesystem path inside the repo where .release-please-config.json lives (default: repo root)'
        required: false
        type: string
        default: '.'
      config-file:
        description: 'Path to release-please config file'
        required: false
        type: string
        default: '.release-please-config.json'
      manifest-file:
        description: 'Path to release-please manifest file (for multi-package/multi-repo coordination)'
        required: false
        type: string
        default: ''
      target-branch:
        description: 'Target branch for release PRs'
        required: false
        type: string
        default: 'main'
    secrets:
      GH_TOKEN:
        required: true
        description: 'Token with contents:write and pull-requests:write permissions'

# release-please creates release PRs and updates CHANGELOG/version files.
permissions:
  contents: write
  pull-requests: write

# release-please is idempotent on rerun, safe to cancel stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      # NOTE: package-name, release-type, and ALL other per-package settings must
      # come from .release-please-config.json (under $.packages[path].*), NOT from
      # the action's `with:` block. If you pass them here, release-please builds
      # an INLINE ReleaserConfig with ONLY a few fields (releaseType,
      # includeComponentInTag, changelogHost, versioning, releaseAs) and IGNORES
      # the full config file (skip-snapshot, bumpMinorPreMajor, packageName, etc.).
      # That's why earlier we observed "Repository needs a snapshot bump" despite
      # skip-snapshot:true in the config file - it was never read.

      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: ${{ inputs.path }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          target-branch: ${{ inputs.target-branch }}
          # Fork PRs need PR approval; this is the default
          # but we make it explicit for clarity
          fork: false