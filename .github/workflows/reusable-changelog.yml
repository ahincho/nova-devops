name: Reusable Changelog Generator
description: Generate CHANGELOG.md from Conventional Commits history using conventional-changelog-cli
on:
  workflow_call:
    inputs:
      from-ref:
        description: 'Starting commit, branch or tag (defaults to project start if empty)'
        required: false
        type: string
        default: ''
      to-ref:
        description: 'Ending commit, branch or tag (defaults to HEAD)'
        required: false
        type: string
        default: 'HEAD'
      output-file:
        description: 'Output file path'
        required: false
        type: string
        default: 'CHANGELOG.md'
      preset:
        description: 'conventional-changelog preset (angular | standard | conventionalcommits)'
        required: false
        type: string
        default: 'angular'
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      commit-changes:
        description: 'If true, commit and push the generated CHANGELOG.md'
        required: false
        type: string
        default: 'false'

jobs:
  changelog:
    name: Generate CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Nova Setup Node
        uses: ahincho/nova-devops/.github/actions/nova-setup-node@v1
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install conventional-changelog-cli
        shell: bash
        run: |
          npm install --no-save --no-audit --no-fund conventional-changelog-cli conventional-changelog-config-spec

      - name: Generate CHANGELOG.md
        shell: bash
        run: |
          OUTPUT_FILE="${{ inputs.output-file }}"
          PRESET="${{ inputs.preset }}"
          FROM_REF="${{ inputs.from-ref }}"
          TO_REF="${{ inputs.to-ref }}"

          # Default releaseCount
          RELEASE_COUNT_ARG="--release-count 1000"

          # If from-ref is provided, use --from flag
          if [ -n "${FROM_REF}" ]; then
            # Resolve to SHA if it's a branch/tag
            if git rev-parse --verify "${FROM_REF}^{commit}" >/dev/null 2>&1; then
              FROM_SHA=$(git rev-parse "${FROM_REF}^{commit}")
            else
              FROM_SHA="${FROM_REF}"
            fi
            echo "Generating CHANGELOG from ${FROM_SHA:0:8} to ${TO_REF}"

            npx conventional-changelog \
              --preset "${PRESET}" \
              --output "${OUTPUT_FILE}" \
              --same-file \
              --from "${FROM_SHA}" \
              --to "${TO_REF}" \
              --release-count 0
          else
            echo "Generating CHANGELOG from project start to ${TO_REF}"

            npx conventional-changelog \
              --preset "${PRESET}" \
              --output "${OUTPUT_FILE}" \
              --same-file \
              --to "${TO_REF}" \
              --release-count 1000
          fi

          if [ -f "${OUTPUT_FILE}" ]; then
            LINES=$(wc -l < "${OUTPUT_FILE}")
            echo "Generated ${OUTPUT_FILE} (${LINES} lines)"
          else
            echo "::error::CHANGELOG.md was not generated"
            exit 1
          fi

      - name: Upload CHANGELOG.md as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: ${{ inputs.output-file }}

      - name: Commit and push (optional)
        if: inputs.commit-changes == 'true' && github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git diff --quiet "${{ inputs.output-file }}"; then
            echo "No changes to ${{ inputs.output-file }}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output-file }}"
          git commit -m "docs(changelog): regenerate CHANGELOG.md"
          git push origin HEAD
