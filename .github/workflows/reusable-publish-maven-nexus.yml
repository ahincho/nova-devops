name: Reusable Publish to Nexus (Maven)
description: Publish a Maven library to a Sonatype Nexus repository (on-premise). GPG optional (depends on Nexus policy).

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      nexus-url:
        description: 'Nexus base URL (e.g. https://nexus.example.com)'
        required: true
        type: string
      nexus-repository:
        description: 'Nexus repository name (e.g. nova-releases, nova-snapshots)'
        required: true
        type: string
      dry-run:
        description: 'If true, runs mvn deploy with altDeploymentRepository=local'
        required: false
        type: string
        default: 'false'
      gpg-key-id:
        description: 'GPG key fingerprint (optional, depends on Nexus policy)'
        required: false
        type: string
        default: ''
      gpg-key:
        description: 'GPG private key ASCII-armored (optional)'
        required: false
        type: string
        default: ''
      gpg-password:
        description: 'GPG passphrase (optional)'
        required: false
        type: string
        default: ''
    secrets:
      NEXUS_USERNAME:
        required: true
        description: 'Nexus username'
      NEXUS_PASSWORD:
        required: true
        description: 'Nexus password or token'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven

      - name: Nova Setup GPG (optional)
        uses: ahincho/nova-devops/.github/actions/nova-setup-gpg@main
        with:
          gpg-signing-key-id: ${{ inputs.gpg-key-id }}
          gpg-signing-key: ${{ inputs.gpg-key }}
          gpg-signing-password: ${{ inputs.gpg-password }}
          fail-on-missing: 'false'

      - name: Configure Maven settings.xml
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>nexus</id>
                <username>${env.NEXUS_USERNAME}</username>
                <password>${env.NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to Nexus
        if: inputs.dry-run != 'true'
        run: mvn deploy -DskipTests -Pnexus-publish -Dnexus.url=${{ inputs.nexus-url }} -Dnexus.repository=${{ inputs.nexus-repository }}
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Dry-run mode
        if: inputs.dry-run == 'true'
        run: |
          mkdir -p /tmp/maven-dry-run
          mvn deploy -DskipTests -Pnexus-publish \
            -Dnexus.url=${{ inputs.nexus-url }} \
            -Dnexus.repository=${{ inputs.nexus-repository }} \
            -DaltDeploymentRepository=local::default::file:///tmp/maven-dry-run
