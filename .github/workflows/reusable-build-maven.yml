name: Reusable Build and Tests (Maven)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos (e.g. nova-bom).
          Optional; without it, cross-repo GitHub Packages reads get a 401
          (GITHUB_TOKEN cannot read packages from a different repo).
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven
          packages-read-token: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || secrets.NOVA_RELEASE_PAT }}

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@main
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main
        with:
          version-source: file
          version-file: pom.xml

      - name: Build and Test
        run: mvn verify

      - name: Lint - Checkstyle
        run: mvn checkstyle:check

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: |
            **/target/site/apidocs/**
