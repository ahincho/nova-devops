# All uses: ahincho/nova-devops/.github/(actions|workflows)/*@main refs below point to the
# main branch (auto-updates on every commit merged to main). For bleeding-edge in-flight
# work, change to @dev. See CHANGELOG.md (Lote P procedure) for the dev/main promotion workflow.

name: Reusable Build and Tests (Maven)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos (e.g. nova-bom).
          Optional; without it, cross-repo GitHub Packages reads get a 401
          (GITHUB_TOKEN cannot read packages from a different repo).
        required: false
      NOVA_PLATFORM_APP_ID:
        description: 'GitHub App ID (numeric). Optional; auto-managed via App if set on consuming repo.'
        required: false
      NOVA_PLATFORM_APP_PRIVATE_KEY:
        description: 'GitHub App private key (PEM contents, multi-line). Optional; auto-managed via App if set on consuming repo.'
        required: false
# Read-only: just runs the build/test pipeline.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Nova Resolve Token
        id: resolve_token
        uses: ahincho/nova-devops/.github/actions/nova-resolve-token@main # pinned to stable; see CHANGELOG Lote P
        with:
          app-id: ${{ secrets.NOVA_PLATFORM_APP_ID }}
          app-private-key: ${{ secrets.NOVA_PLATFORM_APP_PRIVATE_KEY }}

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main # pinned to stable; see CHANGELOG Lote P
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven
          packages-read-token: ${{ steps.resolve_token.outputs.value }}

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@main # pinned to stable; see CHANGELOG Lote P
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main # pinned to stable; see CHANGELOG Lote P
        with:
          version-source: file
          version-file: pom.xml

      - name: Build and Test
        run: mvn verify

      - name: Lint - Checkstyle
        run: mvn checkstyle:check

      - name: Generate JavaDoc
        run: mvn javadoc:javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: javadoc
          path: |
            **/target/site/apidocs/**
