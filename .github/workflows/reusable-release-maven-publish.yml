# All `uses:` refs in this workflow are SHA-pinned (Lote Q hardening, see CHANGELOG.md).
# - External actions: pinned to commit SHAs of the desired version tag
# - Internal actions (ahincho/nova-devops/.github/actions/*): pinned to commit 300f6695c82197f50b2cfa0831bd146ed549a279
# To bump internal action SHAs after a nova-devops release: search/replace the SHA in this file.

name: Reusable Release Publish (Maven)

description: |
  Triggered by tag push (v*.*.*). Runs after release-please creates a tag.
  Publishes to GitHub Packages via `nova-publish-aggregator` (the Maven
  equivalent of the gradle `./gradlew publish` invoked by the Gradle variant).
  Supports cross-repo GitHub Packages reads via `packages-read-token`.

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      visibility:
        description: 'Package visibility (public | private). Defaults to vars.NOVA_PACKAGE_VISIBILITY if set, otherwise "public".'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'If true, deploys to a local file:// repo for verification'
        required: false
        type: string
        default: 'false'
      packages-read-token:
        description: >-
          Token for cross-repo GitHub Packages reads (e.g. consuming nova-bom
          from nova-java-spring-boot-parent). Pass secrets.NOVA_PACKAGES_READ_TOKEN
          (or App token from nova-resolve-token). Falls back to github.token if
          empty, which works only for same-repo reads.
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: true
      NOVA_PACKAGES_READ_TOKEN:
        description: 'Token for cross-repo GitHub Packages reads. Optional; falls back to github.token (same-repo only) if unset.'
        required: false

# Pushes the release tag and publishes the artifact to GitHub Packages.
permissions:
  contents: write
  packages: write

# Tag-driven publish: NEVER cancel; one tag = one canonical publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09  # v5
        with:
          fetch-depth: 0

      - name: Validate tag format
        # Uses env: instead of ${{}} interpolation to avoid actions/code-injection (medium)
        # CodeQL alert. github.ref_name is a tag-triggered string controlled by the user.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $REF_NAME does not match vX.Y.Z format"
            exit 1
          fi
          echo "Tag $REF_NAME is valid semver"

      - name: Nova Setup Java (cross-repo reads wired via packages-read-token)
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven
          packages-read-token: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || inputs.packages-read-token }}

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts (Maven)
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          version-source: file
          version-file: pom.xml

      - name: Resolve package visibility
        id: visibility
        env:
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
          VAR_VISIBILITY: ${{ vars.NOVA_PACKAGE_VISIBILITY }}
          INPUT_VISIBILITY: ${{ inputs.visibility }}
        run: |
          if [ -n "${INPUT_VISIBILITY}" ]; then
            EFFECTIVE="${INPUT_VISIBILITY}"
          elif [ -n "${VAR_VISIBILITY}" ]; then
            EFFECTIVE="${VAR_VISIBILITY}"
          else
            EFFECTIVE="public"
          fi
          echo "value=${EFFECTIVE}" >> "$GITHUB_OUTPUT"
          echo "Effective visibility: ${EFFECTIVE} (repo=${REPO_VISIBILITY}, var=${VAR_VISIBILITY}, input=${INPUT_VISIBILITY})"

      - name: Validate visibility compatibility
        shell: bash
        # Uses env: instead of ${{}} interpolation to avoid actions/code-injection (medium)
        # CodeQL alert. github.event.repository.visibility and step outputs are routed
        # through shell variables that cannot be re-evaluated as expressions.
        env:
          REPO_VIS: ${{ github.event.repository.visibility }}
          PKG_VIS: ${{ steps.visibility.outputs.value }}
        run: |
          if [ "${REPO_VIS}" = "public" ] && [ "${PKG_VIS}" = "private" ]; then
            echo "::error::Cannot publish private package from public repo"
            exit 1
          fi
          if [ "${REPO_VIS}" = "private" ] && [ "${PKG_VIS}" = "public" ]; then
            echo "::error::Cannot publish public package from private repo"
            exit 1
          fi
          echo "Visibility validation OK: repo=${REPO_VIS}, package=${PKG_VIS}"

      - name: Publish to GitHub Packages (Maven)
        uses: ahincho/nova-devops/.github/actions/nova-publish-aggregator@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          registry: github-packages
          build-tool: maven
          visibility: ${{ steps.visibility.outputs.value }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.GH_TOKEN }}

      # SLSA v1.0 Level 3 provenance attestation (Lote M). Attests each
      # deployed jar with a verifiable build provenance record. The Maven
      # aggregator may produce multiple target/<artifact>-<version>.jar files
      # for multi-module repos - the glob below catches all of them. Consumers
      # verify with: gh attestation verify <jar> --owner ahincho
      # Skipped on dry-run since local file:// deploys don't produce attestable
      # remote artifacts.
      - name: Attest deployed jars (SLSA provenance)
        if: inputs.dry-run != 'true'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: '**/target/*.jar'