name: Reusable Publish to Maven Central (Maven)
description: Publish a Maven library to Maven Central via Sonatype OSSRH. GPG signing is REQUIRED.

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      dry-run:
        description: 'If true, runs mvn deploy with altDeploymentRepository=local'
        required: false
        type: string
        default: 'false'
      gpg-key-id:
        description: 'GPG key fingerprint (REQUIRED for Maven Central)'
        required: true
        type: string
      gpg-key:
        description: 'GPG private key ASCII-armored (REQUIRED for Maven Central)'
        required: true
        type: string
      gpg-password:
        description: 'GPG passphrase (optional)'
        required: false
        type: string
        default: ''
    secrets:
      MAVEN_USERNAME:
        required: true
        description: 'Sonatype OSSRH username'
      MAVEN_TOKEN:
        required: true
        description: 'Sonatype OSSRH token'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven

      - name: Nova Setup GPG (REQUIRED)
        uses: ahincho/nova-devops/.github/actions/nova-setup-gpg@main
        with:
          gpg-signing-key-id: ${{ inputs.gpg-key-id }}
          gpg-signing-key: ${{ inputs.gpg-key }}
          gpg-signing-password: ${{ inputs.gpg-password }}
          fail-on-missing: 'true'

      - name: Configure Maven settings.xml
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>sonatype-ossrh</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to Maven Central
        if: inputs.dry-run != 'true'
        run: mvn deploy -DskipTests -Pmaven-central-publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}

      - name: Dry-run mode
        if: inputs.dry-run == 'true'
        run: |
          mkdir -p /tmp/maven-dry-run
          mvn deploy -DskipTests -Pmaven-central-publish \
            -DaltDeploymentRepository=local::default::file:///tmp/maven-dry-run
