# All uses: refs in this workflow are SHA-pinned (Lote Q hardening, see CHANGELOG.md).
# - External actions: pinned to commit SHAs of the desired version tag
# - Internal actions (ahincho/nova-devops/.github/actions/*): pinned to commit 300f6695c82197f50b2cfa0831bd146ed549a279
# To bump internal action SHAs after a nova-devops release: search/replace the SHA in this file.
name: Reusable Publish to GitHub Packages (Maven) [DEPRECATED]

description: |

  DEPRECATED as of 2026-07-21 - use `reusable-release-publish.yml` instead.

  This workflow is preserved for legacy consumers but no new repos should adopt it.
  The replacement workflow is triggered by `v*.*.*` tag pushes (created by
  release-please), supports `vars.NOVA_PACKAGE_VISIBILITY` resolution natively,
  and removes the `GITHUB_TOKEN` reserved-name workaround that this workflow had
  to use.

  Migration: see README section 7 ("reusable-release-publish.yml").

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      visibility:
        description: 'Package visibility (public | private). Defaults to vars.NOVA_PACKAGE_VISIBILITY if set, otherwise "public".'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'If true, runs `mvn deploy` to a local file:// repo for verification'
        required: false
        type: string
        default: 'false'
    secrets:
      # Named GH_TOKEN (not GITHUB_TOKEN): GitHub Actions rejects secret names
      # that collide with reserved system names in workflow_call.secrets.
      GH_TOKEN:
        required: true

# DEPRECATED: still functional for consumers that have not migrated yet.
# Writes: pushes the release tag + uploads to GitHub Packages.
permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: main

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          version-source: file
          version-file: pom.xml

      - name: Nova Publish Aggregator
        uses: ahincho/nova-devops/.github/actions/nova-publish-aggregator@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          registry: github-packages
          build-tool: maven
          # vars is only readable at workflow level; resolved here before
          # being passed as a plain input into the composite action.
          visibility: ${{ inputs.visibility != '' && inputs.visibility || vars.NOVA_PACKAGE_VISIBILITY }}
          dry-run: ${{ inputs.dry-run }}
          github-token: ${{ secrets.GH_TOKEN }}
