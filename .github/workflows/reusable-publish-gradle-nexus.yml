name: Reusable Publish to Nexus (Gradle)
description: Publish a Gradle library to a Sonatype Nexus repository (on-premise). GPG optional (depends on Nexus policy).

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      nexus-url:
        description: 'Nexus base URL (e.g. https://nexus.example.com)'
        required: true
        type: string
      nexus-repository:
        description: 'Nexus repository name (e.g. nova-releases, nova-snapshots)'
        required: true
        type: string
      dry-run:
        description: 'If true, runs gradle publishDryRun to verify config without publishing'
        required: false
        type: string
        default: 'false'
      gpg-key-id:
        description: 'GPG key fingerprint (optional, depends on Nexus policy)'
        required: false
        type: string
        default: ''
      gpg-key:
        description: 'GPG private key ASCII-armored (optional)'
        required: false
        type: string
        default: ''
      gpg-password:
        description: 'GPG passphrase (optional)'
        required: false
        type: string
        default: ''
    secrets:
      NEXUS_USERNAME:
        required: true
        description: 'Nexus username'
      NEXUS_PASSWORD:
        required: true
        description: 'Nexus password or token'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@v1
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: gradle

      - name: Nova Setup GPG (optional)
        uses: ahincho/nova-devops/.github/actions/nova-setup-gpg@v1
        with:
          gpg-signing-key-id: ${{ inputs.gpg-key-id }}
          gpg-signing-key: ${{ inputs.gpg-key }}
          gpg-signing-password: ${{ inputs.gpg-password }}
          fail-on-missing: 'false'

      - name: Publish to Nexus
        if: inputs.dry-run != 'true'
        run: ./gradlew publishNovaPublicationToNexusRepository -Pnexus.url=${{ inputs.nexus-url }} -Pnexus.repository=${{ inputs.nexus-repository }}
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Dry-run mode
        if: inputs.dry-run == 'true'
        run: ./gradlew publishNovaPublicationToNexusRepository --dry-run -Pnexus.url=${{ inputs.nexus-url }} -Pnexus.repository=${{ inputs.nexus-repository }}
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
