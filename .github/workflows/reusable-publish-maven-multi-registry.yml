name: Reusable Publish Multi-Registry (Maven)
description: Publish a Maven library to BOTH GitHub Packages and Maven Central (Sonatype OSSRH) in a single run

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
      visibility:
        description: 'Package visibility for GitHub Packages (public | private). Defaults to vars.NOVA_PACKAGE_VISIBILITY if set, otherwise "public".'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'If true, runs mvn deploy with altDeploymentRepository=local'
        required: false
        type: string
        default: 'false'
      gpg-key-id:
        description: 'GPG key fingerprint (passed as input from workflow secrets)'
        required: false
        type: string
        default: ''
      gpg-key:
        description: 'GPG private key ASCII-armored (passed as input from workflow secrets)'
        required: false
        type: string
        default: ''
      gpg-password:
        description: 'GPG passphrase (passed as input from workflow secrets)'
        required: false
        type: string
        default: ''
    secrets:
      # Named GH_TOKEN (not GITHUB_TOKEN): GitHub Actions rejects secret names
      # that collide with reserved system names in workflow_call.secrets.
      GH_TOKEN:
        required: true
      MAVEN_USERNAME:
        required: false
        description: 'Sonatype OSSRH username. If not provided, Maven Central publish is skipped.'
      MAVEN_TOKEN:
        required: false
        description: 'Sonatype OSSRH token. If not provided, Maven Central publish is skipped.'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: maven

      - name: Nova Setup GPG
        uses: ahincho/nova-devops/.github/actions/nova-setup-gpg@main
        with:
          gpg-signing-key-id: ${{ inputs.gpg-key-id }}
          gpg-signing-key: ${{ inputs.gpg-key }}
          gpg-signing-password: ${{ inputs.gpg-password }}
          fail-on-missing: 'false'

      - name: Configure Maven settings.xml
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>sonatype-ossrh</id>
                <username>${env.MAVEN_USERNAME}</username>
                <password>${env.MAVEN_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Publish to GitHub Packages
        if: inputs.dry-run != 'true' && env.MAVEN_USERNAME != ''
        run: mvn deploy -DskipTests -Pgithub-publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish to Maven Central
        if: inputs.dry-run != 'true' && env.MAVEN_USERNAME != ''
        run: mvn deploy -DskipTests -Pmaven-central-publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}

      - name: Dry-run mode
        if: inputs.dry-run == 'true'
        run: |
          mkdir -p /tmp/maven-dry-run
          mvn deploy -DskipTests \
            -DaltDeploymentRepository=local::default::file:///tmp/maven-dry-run
