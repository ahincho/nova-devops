# All uses: refs in this workflow are SHA-pinned (Lote Q hardening, see CHANGELOG.md).
# - External actions: pinned to commit SHAs of the desired version tag
# - Internal actions (ahincho/nova-devops/.github/actions/*): pinned to commit 300f6695c82197f50b2cfa0831bd146ed549a279
# To bump internal action SHAs after a nova-devops release: search/replace the SHA in this file.
name: Reusable Build Matrix (Multi-Java)

on:
  workflow_call:
    inputs:
      java-versions:
        description: 'JSON array of Java versions to test against (e.g., ["21", "25"])'
        required: false
        type: string
        default: '["21", "25"]'
      build-tool:
        description: 'Build tool (maven | gradle)'
        required: false
        type: string
        default: 'gradle'
      fail-fast:
        description: 'Stop all matrix jobs on first failure'
        required: false
        type: boolean
        default: false
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos (Maven only). Optional;
          without it, cross-repo GitHub Packages reads get a 401.
        required: false
      NOVA_PLATFORM_APP_ID:
        description: 'GitHub App ID (numeric). Optional; auto-managed via App if set on consuming repo.'
        required: false
      NOVA_PLATFORM_APP_PRIVATE_KEY:
        description: 'GitHub App private key (PEM contents, multi-line). Optional; auto-managed via App if set on consuming repo.'
        required: false
# Read-only: matrix of build/test runs. GitHub Packages writes happen via
# NOVA_PACKAGES_READ_TOKEN, not GITHUB_TOKEN, so this stays at contents: read.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  matrix-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        java-version: ${{ fromJSON(inputs.java-versions) }}

    name: Build (Java ${{ matrix.java-version }})

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Make gradlew executable
        if: inputs.build-tool == 'gradle'
        run: chmod +x ./gradlew

      - name: Nova Resolve Token
        id: resolve_token
        uses: ahincho/nova-devops/.github/actions/nova-resolve-token@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          app-id: ${{ secrets.NOVA_PLATFORM_APP_ID }}
          app-private-key: ${{ secrets.NOVA_PLATFORM_APP_PRIVATE_KEY }}

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          java-version: ${{ matrix.java-version }}
          build-tool: ${{ inputs.build-tool }}
          packages-read-token: ${{ steps.resolve_token.outputs.value }}

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          min-java-version: '21'

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@300f6695c82197f50b2cfa0831bd146ed549a279  # @main (Lote Q SHA-pin)
        with:
          version-source: ${{ inputs.build-tool == 'gradle' && 'gradle-properties' || 'file' }}
          version-file: ${{ inputs.build-tool == 'gradle' && 'gradle.properties' || 'pom.xml' }}

      - name: Build and Test (Gradle)
        if: inputs.build-tool == 'gradle'
        env:
          NOVA_PACKAGES_READ_TOKEN: ${{ steps.resolve_token.outputs.value }}
        run: ./gradlew build

      - name: Build and Test (Maven)
        if: inputs.build-tool == 'maven'
        run: mvn verify

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-reports-java-${{ matrix.java-version }}
          path: |
            **/build/reports/tests/**
            **/target/surefire-reports/**

  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: matrix-build
    if: always()

    steps:
      - name: Matrix Summary
        env:
          VERSIONS: ${{ inputs.java-versions }}
          MATRIX_RESULT: ${{ needs.matrix-build.result }}
          BUILD_TOOL: ${{ inputs.build-tool }}
          FAIL_FAST: ${{ inputs.fail-fast }}
        run: |
          echo "## Build Matrix Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Java Version | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "${VERSIONS}" | jq -r '.[]' | while read -r ver; do
            if [ "${MATRIX_RESULT}" = "success" ]; then
              STATUS="✅"
            else
              STATUS="❌"
            fi
            echo "| ${ver} | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Build tool: **${BUILD_TOOL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Fail-fast: **${FAIL_FAST}**" >> "$GITHUB_STEP_SUMMARY"
