name: Reusable Version Bump (Gradle)

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true
    outputs:
      new-version:
        description: 'The new semantic version calculated (e.g. 1.2.0)'
        value: ${{ jobs.version-bump.outputs.new-version }}

jobs:
  version-bump:
    runs-on: ubuntu-latest

    outputs:
      new-version: ${{ steps.calculate-version.outputs.new-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Determine bump type from PR labels
        id: bump-type
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Find the merged PR associated with this push
          COMMIT_SHA="${{ github.sha }}"
          PR_NUMBER=$(gh pr list --state merged --search "${COMMIT_SHA}" --json number --jq '.[0].number' 2>/dev/null || echo "")

          # Fallback: extract PR number from merge commit message (e.g. "Merge pull request #42 from ...")
          if [ -z "$PR_NUMBER" ]; then
            COMMIT_MSG=$(git log -1 --pretty=%s)
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '#\K[0-9]+' | head -1 || echo "")
          fi

          BUMP_TYPE="patch"

          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #${PR_NUMBER}"
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            echo "PR labels: ${LABELS}"

            if echo "$LABELS" | grep -qw "major"; then
              BUMP_TYPE="major"
            elif echo "$LABELS" | grep -qw "minor"; then
              BUMP_TYPE="minor"
            elif echo "$LABELS" | grep -qw "patch"; then
              BUMP_TYPE="patch"
            fi
          else
            echo "No PR number found, defaulting to patch"
          fi

          echo "bump-type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"
          echo "Bump type: ${BUMP_TYPE}"

      - name: Read current version
        id: read-version
        run: |
          CURRENT_VERSION=$(grep "^version" build.gradle.kts | sed 's/version *= *"\(.*\)"/\1/')
          echo "current-version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT_VERSION}"

      - name: Calculate new version
        id: calculate-version
        run: |
          BUMP_TYPE="${{ steps.bump-type.outputs.bump-type }}"
          CURRENT_VERSION="${{ steps.read-version.outputs.current-version }}"

          echo "Current version: ${CURRENT_VERSION}"
          echo "Bump type: ${BUMP_TYPE}"

          # Strip -SNAPSHOT suffix if present
          VERSION=$(echo "$CURRENT_VERSION" | sed 's/-SNAPSHOT//')

          # Parse MAJOR.MINOR.PATCH (handle versions like 1.0 by defaulting PATCH to 0)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=${PATCH:-0}

          # Calculate new version based on bump type
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new-version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_VERSION}"

      - name: Update version
        run: |
          NEW_VERSION="${{ steps.calculate-version.outputs.new-version }}"
          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" build.gradle.kts

      - name: Commit, tag and push
        run: |
          NEW_VERSION="${{ steps.calculate-version.outputs.new-version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags
