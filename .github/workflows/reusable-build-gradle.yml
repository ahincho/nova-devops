name: Reusable Build and Tests (Gradle)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos. Optional; falls back
          to NOVA_RELEASE_PAT (already proven to have this scope) if unset.
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: gradle

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@main
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main
        with:
          version-source: gradle-properties

      - name: Resolve packages read token
        id: resolve_token
        env:
          TOKEN_A: ${{ secrets.NOVA_PACKAGES_READ_TOKEN }}
          TOKEN_B: ${{ secrets.NOVA_RELEASE_PAT }}
          TOKEN_C: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pick the first non-empty token (NOVA_PACKAGES_READ_TOKEN > NOVA_RELEASE_PAT > GITHUB_TOKEN).
          # GitHub Actions expression `secrets.X || secrets.Y` doesn't short-circuit
          # the way bash `||` does; we do it in shell instead. Without this step,
          # the expression evaluates to "1" (one char) when secrets.NOVA_PACKAGES_READ_TOKEN
          # is unset (treated as null), even if secrets.NOVA_RELEASE_PAT has a value.
          # Discovered in the notifications module publish workflow (commit bb67ea7).
          if [ -n "${TOKEN_A}" ]; then
            echo "value=${TOKEN_A}" >> "$GITHUB_OUTPUT"
          elif [ -n "${TOKEN_B}" ]; then
            echo "value=${TOKEN_B}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${TOKEN_C}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Test
        env:
          # Used to READ internal Nova Platform dependencies published in other
          # repos' GitHub Packages (GITHUB_TOKEN cannot read packages cross-repo).
          # The resolve_token step picks the first non-empty secret out of
          # NOVA_PACKAGES_READ_TOKEN / NOVA_RELEASE_PAT / GITHUB_TOKEN.
          NOVA_PACKAGES_READ_TOKEN: ${{ steps.resolve_token.outputs.value }}
        run: ./gradlew build

      - name: Lint - Checkstyle
        # Only lint production code (checkstyleMain), matching the `checkstyle {
        # sourceSets = [main] }` convention every Nova repo configures in its
        # build.gradle.kts. Test suites legitimately rely on static-import
        # wildcards (Assertions.*, jqwik.api.*) that AvoidStarImport/UnusedImports
        # would otherwise flag. Explicitly running checkstyleTest here bypassed
        # that per-repo opt-out, since the Gradle Checkstyle plugin always
        # creates the checkstyleTest task regardless of the sourceSets property
        # (that property only controls the `check` lifecycle wiring, not task
        # existence). See docs/java/06-semantic-versioning-en-java.md §11.9.30.
        run: ./gradlew checkstyleMain

      - name: Generate JavaDoc
        run: ./gradlew javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: |
            **/build/docs/javadoc/**
