name: Reusable Build and Tests (Gradle)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos. Optional; falls back
          to NOVA_RELEASE_PAT (already proven to have this scope) if unset.
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: gradle

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@main
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main
        with:
          version-source: gradle-properties

      - name: Build and Test
        env:
          # Falls back to NOVA_RELEASE_PAT (already proven to have packages:read,
          # see docs/java/06-semantic-versioning-en-java.md §11.9.17) so cross-repo
          # consumers (observability-spring-boot-starter, spring-boot-starter,
          # commons-spring-boot-starter) don't need a brand-new dedicated secret.
          # This env var was missing entirely from this step until now (§11.9.30
          # bug B) - build.gradle.kts reads it via System.getenv(), but nothing
          # ever set it, so it silently fell through to GITHUB_TOKEN, which
          # cannot read packages from a different repo.
          NOVA_PACKAGES_READ_TOKEN: ${{ secrets.NOVA_PACKAGES_READ_TOKEN || secrets.NOVA_RELEASE_PAT }}
        run: ./gradlew build

      - name: Lint - Checkstyle
        # Only lint production code (checkstyleMain), matching the `checkstyle {
        # sourceSets = [main] }` convention every Nova repo configures in its
        # build.gradle.kts. Test suites legitimately rely on static-import
        # wildcards (Assertions.*, jqwik.api.*) that AvoidStarImport/UnusedImports
        # would otherwise flag. Explicitly running checkstyleTest here bypassed
        # that per-repo opt-out, since the Gradle Checkstyle plugin always
        # creates the checkstyleTest task regardless of the sourceSets property
        # (that property only controls the `check` lifecycle wiring, not task
        # existence). See docs/java/06-semantic-versioning-en-java.md §11.9.30.
        run: ./gradlew checkstyleMain

      - name: Generate JavaDoc
        run: ./gradlew javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: |
            **/build/docs/javadoc/**
