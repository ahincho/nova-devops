name: Reusable Build and Tests (Gradle)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: 'gradle'

      - name: Build and Test
        run: ./gradlew build

      - name: Lint - Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Generate JavaDoc
        run: ./gradlew javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: |
            **/build/docs/javadoc/**
