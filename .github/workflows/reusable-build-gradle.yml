# All uses: ahincho/nova-devops/.github/(actions|workflows)/*@main refs below point to the
# main branch (auto-updates on every commit merged to main). For bleeding-edge in-flight
# work, change to @dev. See CHANGELOG.md (Lote P procedure) for the dev/main promotion workflow.

name: Reusable Build and Tests (Gradle)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '25'
    secrets:
      NOVA_PACKAGES_READ_TOKEN:
        description: >-
          Token with read:packages scope, used to resolve pe.edu.nova.java
          dependencies published from OTHER Nova repos. Optional; falls back
          to NOVA_RELEASE_PAT (already proven to have this scope) if unset.
        required: false
      NOVA_PLATFORM_APP_ID:
        description: 'GitHub App ID (numeric). Optional; auto-managed via App if set on consuming repo.'
        required: false
      NOVA_PLATFORM_APP_PRIVATE_KEY:
        description: 'GitHub App private key (PEM contents, multi-line). Optional; auto-managed via App if set on consuming repo.'
        required: false
# Read-only: just runs the build/test pipeline.
permissions:
  contents: read

# Per-caller concurrency: a PR pushing 3 commits only sees the latest build.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main # pinned to stable; see CHANGELOG Lote P
        with:
          java-version: ${{ inputs.java-version }}
          build-tool: gradle

      - name: Nova Validate Build
        uses: ahincho/nova-devops/.github/actions/nova-validate-build@main # pinned to stable; see CHANGELOG Lote P
        with:
          min-java-version: ${{ inputs.java-version }}

      - name: Nova Gather Facts
        id: facts
        uses: ahincho/nova-devops/.github/actions/nova-gather-facts@main # pinned to stable; see CHANGELOG Lote P
        with:
          version-source: gradle-properties

      - name: Nova Resolve Token
        id: resolve_token
        uses: ahincho/nova-devops/.github/actions/nova-resolve-token@main # pinned to stable; see CHANGELOG Lote P
        with:
          app-id: ${{ secrets.NOVA_PLATFORM_APP_ID }}
          app-private-key: ${{ secrets.NOVA_PLATFORM_APP_PRIVATE_KEY }}

      - name: Build and Test
        env:
          # Used to READ internal Nova Platform dependencies published in other
          # repos' GitHub Packages (GITHUB_TOKEN cannot read packages cross-repo).
          # The resolve_token step picks the first non-empty secret out of
          # NOVA_PACKAGES_READ_TOKEN / NOVA_RELEASE_PAT / GITHUB_TOKEN.
          NOVA_PACKAGES_READ_TOKEN: ${{ steps.resolve_token.outputs.value }}
        run: ./gradlew build

      - name: Lint - Checkstyle
        # Only lint production code (checkstyleMain), matching the `checkstyle {
        # sourceSets = [main] }` convention every Nova repo configures in its
        # build.gradle.kts. Test suites legitimately rely on static-import
        # wildcards (Assertions.*, jqwik.api.*) that AvoidStarImport/UnusedImports
        # would otherwise flag. Explicitly running checkstyleTest here bypassed
        # that per-repo opt-out, since the Gradle Checkstyle plugin always
        # creates the checkstyleTest task regardless of the sourceSets property
        # (that property only controls the `check` lifecycle wiring, not task
        # existence). See docs/java/06-semantic-versioning-en-java.md §11.9.30.
        run: ./gradlew checkstyleMain

      - name: Generate JavaDoc
        run: ./gradlew javadoc

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**

      - name: Upload JavaDoc
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: javadoc
          path: |
            **/build/docs/javadoc/**
