name: 'Nova Publish Aggregator'
description: 'Dispatch publish to the correct registry based on inputs (github-packages | maven-central | nexus | sonatype-staging)'
inputs:
  registry:
    description: 'Target registry (github-packages | maven-central | nexus | sonatype-staging)'
    required: true
  visibility:
    description: 'Package visibility (public | private). Defaults to vars.NOVA_PACKAGE_VISIBILITY if set, otherwise "public".'
    required: false
    default: ''
  build-tool:
    description: 'Build tool (maven | gradle)'
    required: true
  java-version:
    description: 'Java version'
    required: false
    default: '25'
  dry-run:
    description: 'If true, only print commands without executing'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for authentication (pass secrets.GITHUB_TOKEN from the caller workflow)'
    required: false
    default: ''
  maven-username:
    description: 'Maven Central / Sonatype username (required for maven-central registry)'
    required: false
    default: ''
  maven-token:
    description: 'Maven Central / Sonatype token (required for maven-central registry)'
    required: false
    default: ''
  nexus-username:
    description: 'Nexus username (required for nexus registry)'
    required: false
    default: ''
  nexus-password:
    description: 'Nexus password (required for nexus registry)'
    required: false
    default: ''
outputs:
  effective-visibility:
    description: 'Resolved visibility value used for publish'
    value: ${{ steps.visibility.outputs.value }}
runs:
  using: 'composite'
  steps:
    - name: Resolve effective token
      id: token
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.github-token }}
        FALLBACK_TOKEN: ${{ github.token }}
      run: |
        # Prefer explicit input; fallback to github.token (accessible in composite actions)
        if [ -n "${INPUT_TOKEN}" ]; then
          echo "token=${INPUT_TOKEN}" >> "$GITHUB_OUTPUT"
        else
          echo "token=${FALLBACK_TOKEN}" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve effective visibility
      id: visibility
      shell: bash
      env:
        INPUT_VISIBILITY: ${{ inputs.visibility }}
        VAR_VISIBILITY: ${{ vars.NOVA_PACKAGE_VISIBILITY }}
      run: |
        if [ -n "${INPUT_VISIBILITY}" ]; then
          EFFECTIVE="${INPUT_VISIBILITY}"
        elif [ -n "${VAR_VISIBILITY}" ]; then
          EFFECTIVE="${VAR_VISIBILITY}"
        else
          EFFECTIVE="public"
        fi
        echo "value=${EFFECTIVE}" >> "$GITHUB_OUTPUT"
        echo "Effective visibility: ${EFFECTIVE} (input=${INPUT_VISIBILITY}, var=${VAR_VISIBILITY})"

    - name: Validate visibility against repo visibility
      shell: bash
      env:
        REPO_VIS: ${{ github.event.repository.visibility }}
        PKG_VIS: ${{ steps.visibility.outputs.value }}
      run: |
        if [ "${REPO_VIS}" = "public" ] && [ "${PKG_VIS}" = "private" ]; then
          echo "::error::Cannot publish private package from public repo"
          exit 1
        fi
        if [ "${REPO_VIS}" = "private" ] && [ "${PKG_VIS}" = "public" ]; then
          echo "::error::Cannot publish public package from private repo"
          exit 1
        fi
        echo "Visibility validation OK: repo=${REPO_VIS}, package=${PKG_VIS}"

    - name: Configure Maven settings.xml (for Maven builds)
      if: inputs.build-tool == 'maven'
      shell: bash
      env:
        EFFECTIVE_TOKEN: ${{ steps.token.outputs.token }}
        MAVEN_USERNAME: ${{ inputs.maven-username }}
        MAVEN_TOKEN: ${{ inputs.maven-token }}
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<EOF
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                      https://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>github</id>
              <username>${GITHUB_ACTOR}</username>
              <password>${EFFECTIVE_TOKEN}</password>
            </server>
            <server>
              <id>central</id>
              <username>${MAVEN_USERNAME}</username>
              <password>${MAVEN_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF
        echo "Maven settings.xml configured with github + central servers."

    - name: Dry-run notice
      if: inputs.dry-run == 'true'
      shell: bash
      run: echo "::notice::DRY-RUN mode active. No artifacts will be published to remote registries."

    - name: Dispatch to GitHub Packages
      if: inputs.registry == 'github-packages' && inputs.dry-run != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.build-tool }}" = "gradle" ]; then
          ./gradlew publish -Pvisibility=${{ steps.visibility.outputs.value }}
        else
          mvn deploy -DskipTests -Dvisibility=${{ steps.visibility.outputs.value }}
        fi
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}

    - name: Dispatch to GitHub Packages (dry-run)
      if: inputs.registry == 'github-packages' && inputs.dry-run == 'true'
      shell: bash
      run: |
        if [ "${{ inputs.build-tool }}" = "gradle" ]; then
          ./gradlew publishToMavenLocal -Pvisibility=${{ steps.visibility.outputs.value }}
        else
          mkdir -p /tmp/maven-dry-run
          mvn deploy -DskipTests -Dvisibility=${{ steps.visibility.outputs.value }} \
            -DaltDeploymentRepository=local::default::file:///tmp/maven-dry-run
        fi
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}

    - name: Dispatch to Maven Central (via Sonatype)
      if: (inputs.registry == 'maven-central' || inputs.registry == 'sonatype-staging') && inputs.dry-run != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.build-tool }}" = "gradle" ]; then
          ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository -Pvisibility=${{ steps.visibility.outputs.value }}
        else
          mvn deploy -P central -DskipTests
        fi
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        MAVEN_USERNAME: ${{ inputs.maven-username }}
        MAVEN_TOKEN: ${{ inputs.maven-token }}

    - name: Dispatch to Nexus
      if: inputs.registry == 'nexus' && inputs.dry-run != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.build-tool }}" = "gradle" ]; then
          ./gradlew publish -Pvisibility=${{ steps.visibility.outputs.value }}
        else
          mvn deploy -DskipTests
        fi
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        NEXUS_USERNAME: ${{ inputs.nexus-username }}
        NEXUS_PASSWORD: ${{ inputs.nexus-password }}