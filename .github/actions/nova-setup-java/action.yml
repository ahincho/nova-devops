name: 'Setup Nova Java Environment'
description: 'Setup Java with Gradle/Maven cache following Nova conventions'
inputs:
  java-version:
    description: 'Java version to use'
    required: false
    default: '25'
  build-tool:
    description: 'Build tool (maven | gradle)'
    required: false
    default: 'gradle'
  distribution:
    description: 'JDK distribution'
    required: false
    default: 'temurin'
  packages-read-token:
    description: >-
      Token for reading GitHub Packages published by OTHER Nova repos
      (Maven only - Gradle repos configure cross-repo read credentials
      directly in their build.gradle.kts). Pass secrets.NOVA_PACKAGES_READ_TOKEN
      from the caller. Falls back to github.token if empty, which works for
      same-repo reads but NOT cross-repo ones (GITHUB_TOKEN cannot read
      packages from a different repo - see docs/java/06-semantic-versioning-en-java.md Â§11.9.30).
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Setup Java ${{ inputs.java-version }}
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        distribution: ${{ inputs.distribution }}
        java-version: ${{ inputs.java-version }}
        cache: ${{ inputs.build-tool }}

    - name: Validate build file exists
      shell: bash
      run: |
        if [ ! -f "gradle.properties" ] && [ ! -f "pom.xml" ]; then
          echo "::error::No build file found. Nova requires gradle.properties or pom.xml"
          exit 1
        fi

    - name: Setup Gradle (if gradle)
      if: inputs.build-tool == 'gradle'
      uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947  # v4
      with:
        cache-read-only: ${{ github.event_name != 'push' }}

    - name: Configure Maven settings.xml for cross-repo package reads (if maven)
      if: inputs.build-tool == 'maven'
      shell: bash
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        EFFECTIVE_TOKEN: ${{ inputs.packages-read-token != '' && inputs.packages-read-token || github.token }}
      run: |
        # NOTE: Maven requires repositories.repository.id to be unique within a
        # POM, so a single shared server id cannot back >1 repository URL (a
        # pom.xml importing from 2+ different Nova repos, e.g. nova-bom AND
        # nova-java-spring-boot-starter, needs 2 distinct ids). All entries
        # below share the SAME credentials - add a new <server> here whenever
        # a Maven consumer needs to read from another Nova repo for the first
        # time, then reference that id from the consumer's <repositories>.
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<EOF
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                      https://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>nova-packages-read-bom</id>
              <username>${GITHUB_ACTOR}</username>
              <password>${EFFECTIVE_TOKEN}</password>
            </server>
            <server>
              <id>nova-packages-read-starter</id>
              <username>${GITHUB_ACTOR}</username>
              <password>${EFFECTIVE_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF
        echo "Maven settings.xml configured with nova-packages-read-* servers."
